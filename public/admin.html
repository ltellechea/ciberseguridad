<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Envío de campaña</title>
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body class="min-h-screen bg-gray-100 flex justify-center py-10 px-4">
    <div class="bg-white rounded-xl shadow-md p-8 w-full max-w-lg h-fit">
      <h1 class="text-xl font-bold mb-6 text-gray-900">Enviar campaña de email</h1>

      <label for="secret" class="block text-sm font-semibold mb-1 text-gray-700">Clave de administrador</label>
      <input type="password" id="secret" placeholder="ADMIN_SECRET"
        class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />

      <label for="csvFile" class="block text-sm font-semibold mb-1 text-gray-700">Subir archivo CSV</label>
      <input type="file" id="csvFile" accept=".csv,text/csv"
        class="w-full text-sm text-gray-600 mb-4 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />

      <label for="csvText" class="block text-sm font-semibold mb-1 text-gray-700">O pegar contenido CSV</label>
      <textarea id="csvText" placeholder="email;nombre&#10;usuario@ejemplo.com;Juan Pérez"
        class="w-full px-3 py-2 border border-gray-300 rounded-md text-xs font-mono h-40 resize-y mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>

      <button id="sendBtn" onclick="sendCampaign()"
        class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white rounded-md font-medium text-base cursor-pointer transition-colors">
        Enviar campaña
      </button>

      <div id="status" class="mt-5 text-sm"></div>
    </div>

    <script>
      document.getElementById("csvFile").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById("csvText").value = await file.text();
      });

      async function sendCampaign() {
        const secret = document.getElementById("secret").value.trim();
        const csv = document.getElementById("csvText").value.trim();
        const status = document.getElementById("status");
        const btn = document.getElementById("sendBtn");

        if (!secret) { status.innerHTML = '<p class="text-red-600">Ingresá la clave de administrador.</p>'; return; }
        if (!csv) { status.innerHTML = '<p class="text-red-600">Cargá o pegá el contenido CSV.</p>'; return; }

        btn.disabled = true;
        status.innerHTML = '<p class="text-gray-500">Enviando...</p>';

        try {
          const res = await fetch("/api/send-from-csv", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${secret}` },
            body: JSON.stringify({ csv }),
          });

          const data = await res.json();

          if (!res.ok) {
            status.innerHTML = `<p class="text-red-600">Error: ${data.error}</p>`;
          } else {
            const errors = (data.results || []).filter(r => r.status === "error");
            let html = `<p class="text-green-700 font-medium">✅ Enviados: ${data.sent} &nbsp; ❌ Fallidos: ${data.failed}</p>`;
            errors.forEach(r => {
              html += `<p class="text-xs mt-1 text-red-600">— ${r.email}: ${r.error}</p>`;
            });
            status.innerHTML = html;
          }
        } catch (err) {
          status.innerHTML = `<p class="text-red-600">Error de red: ${err.message}</p>`;
        } finally {
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
